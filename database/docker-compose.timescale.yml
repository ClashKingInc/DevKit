name: clashking_tracking

services:
  timescale:
    image: timescale/timescaledb:latest-pg18
    container_name: clashking-tracking-timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TIMESCALE_DB}
      POSTGRES_USER: ${TIMESCALE_USER}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    ports:
      - "${HOST_BIND_IP}:${TIMESCALE_PORT}:5432"
    volumes:
      - timescale-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timescale-data:
