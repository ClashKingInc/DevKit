name: clashking-local-data

services:
  timescale:
    image: timescale/timescaledb:latest-pg18
    container_name: clashking-local-timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracking}
      POSTGRES_USER: ${POSTGRES_USER:-tracking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracking}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - timescale-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8
    container_name: clashking-local-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-insight:
    image: redis/redisinsight:latest
    container_name: clashking-local-redis-insight
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    volumes:
      - redis-insight-data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: clashking-local-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"

volumes:
  timescale-data:
  valkey-data:
  redis-insight-data:
