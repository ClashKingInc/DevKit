name: Validate developer kit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  database-and-design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: database/migrations/go.mod
          cache-dependency-path: database/migrations/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Validate repository
        run: scripts/validate-repository.sh
