name: clashking_tracking

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: clashking-tracking-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "100.96.0.1:${JAEGER_UI_PORT}:16686"
      - "100.96.0.1:${OTEL_GRPC_PORT}:4317"
      - "100.96.0.1:${OTEL_HTTP_PORT}:4318"
