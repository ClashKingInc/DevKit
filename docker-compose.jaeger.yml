name: clashking_tracking

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: clashking-tracking-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
    ports:
      - "${JAEGER_UI_PORT:?set JAEGER_UI_PORT}:16686"
      - "${OTEL_GRPC_PORT:?set OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT:?set OTEL_HTTP_PORT}:4318"
